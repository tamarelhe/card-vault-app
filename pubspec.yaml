name: card_vault_app
description: "MTG Card Collection Manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Camera and ML Kit for continuous card scanning
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.14.0

  # Networking
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
